<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host Dashboard - btranslate</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body style="margin-top: 0;">

  <!-- Navbar Navigation -->
  <nav class="navbar">
    <a href="/" class="nav-brand" data-i18n="nav_title">B-Translate</a>
    <div class="lang-switcher">
      <span class="lang-toggle" data-lang="en" onclick="changeSiteLanguage('en')">EN</span>
      <span>|</span>
      <span class="lang-toggle" data-lang="tr" onclick="changeSiteLanguage('tr')">TR</span>
    </div>
  </nav>

  <div class="container" style="margin-top: 6rem;">
    <div class="glass-panel" id="login-panel">
      <h2 class="title-primary" style="font-size: 2rem;" data-i18n="host_login_title">Host Login</h2>
      <div class="form-group">
        <label data-i18n="lbl_username">Username</label>
        <input type="text" id="login-user" />
      </div>
      <div class="form-group">
        <label data-i18n="lbl_password">Password</label>
        <input type="password" id="login-pass" />
      </div>
      <button class="btn-primary" onclick="login()" data-i18n="btn_login">Login</button>
      <div id="login-error" style="color:var(--danger-color); margin-top:1rem;"></div>
    </div>

    <div class="glass-panel" id="app-panel" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2 class="title-primary" style="font-size: 1.5rem; margin: 0;" data-i18n="host_dash_title">Host Dashboard</h2>
        <div>
          <button class="btn-primary" style="background: rgba(0,0,0,0.1); padding: 0.5rem 1rem;" id="btn-admin" onclick="toggleAdminModal()" style="display:none;" data-i18n="btn_usermgmt">User Mgmt</button>
          <button class="btn-primary" style="background: rgba(0,0,0,0.1); padding: 0.5rem 1rem; margin-left: 0.5rem;" onclick="logout()" data-i18n="btn_logout">Logout</button>
        </div>
      </div>
      
      <div id="setup-section">
        <p class="subtitle" style="margin-bottom: 1rem;" data-i18n="setup_subtitle">Create a new broadcast session</p>
        <div class="form-group" style="margin-bottom: 1rem;">
          <input type="text" id="event-name" placeholder="E.g., Q3 Global Townhall" data-i18n-placeholder="lbl_event_name_placeholder" style="text-align: center;">
        </div>
        <button class="btn-primary" id="btn-create" onclick="createSession()" data-i18n="btn_gen_code">Generate Event Code</button>
      </div>

      <div id="broadcast-section" style="display: none;">
        <div style="background: rgba(0,0,0,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; text-align: center; border: 1px solid rgba(0,0,0,0.05); box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
          <p style="color: var(--text-secondary); margin-bottom: 0.5rem; font-size: 0.9em;" data-i18n="lbl_event_code">YOUR EVENT CODE</p>
          <h1 id="display-code" style="font-size: 3rem; letter-spacing: 4px; color: var(--accent-color);"></h1>
          <div id="qrcode" style="display: flex; justify-content: center; margin: 1.5rem 0;"></div>
          <p style="font-size: 0.85em; color: var(--text-secondary); margin-top: 0.5rem;" data-i18n="lbl_share_code">Share this code with participants</p>
        </div>

        <div style="text-align: center; margin-bottom: 1rem;">
          <button class="btn-primary" id="btn-start" onclick="startBroadcast()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path></svg>
            <span data-i18n="btn_start_mic">Start Microphone</span>
          </button>
          <button class="btn-primary btn-danger" id="btn-stop" onclick="stopBroadcast()" style="display: none;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12"></rect></svg>
            <span data-i18n="btn_stop_mic">Stop Broadcast</span>
          </button>
        </div>

        <div id="status-indicator" style="text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-top: 1rem;" data-i18n="status_ready">
          Status: Ready to broadcast
        </div>
      </div>
    </div>

    <!-- User Mgmt Modal -->
    <div id="admin-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 2000;">
      <div class="glass-panel" style="width: 500px; max-width: 90vw; position: relative;">
        <h3 class="title-primary" style="font-size: 1.5rem;" data-i18n="admin_title">User Management</h3>
        <button onclick="toggleAdminModal()" style="position: absolute; right: 1rem; top: 1rem; background: none; border: none; color: var(--text-primary); cursor: pointer; font-size: 1.5rem;">&times;</button>
        
        <div style="margin: 1.5rem 0; max-height: 200px; overflow-y: auto;">
          <ul id="user-list" style="list-style: none; padding: 0; display: flex; flex-direction: column; gap: 0.5rem;"></ul>
        </div>
        
        <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 1rem 0;" />
        
        <div style="display: flex; gap: 0.5rem;">
          <input type="text" id="new-user" placeholder="Username" style="flex: 1;">
          <input type="password" id="new-pass" placeholder="Password" style="flex: 1;">
          <button class="btn-primary" onclick="createUser()" data-i18n="btn_add">Add</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer" data-i18n="footer_copy">
    © 2026 B-Translate. Made with ❤️ by Beykoz Üniversitesi Bilgi İşlem Direktörlüğü.
  </footer>

  <script src="/static/lang.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    let currentEventCode = null;
    let mediaRecorder = null;
    let socket = null;
    let autoToken = localStorage.getItem('bt_token');
    
    if (autoToken) {
      document.getElementById('login-panel').style.display = 'none';
      document.getElementById('app-panel').style.display = 'block';
      if(localStorage.getItem('bt_role') === 'admin') {
         document.getElementById('btn-admin').style.display = 'inline-block';
      }
    }

    async function login() {
      const u = document.getElementById('login-user').value;
      const p = document.getElementById('login-pass').value;
      const formData = new URLSearchParams();
      formData.append('username', u);
      formData.append('password', p);
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: formData
        });
        if (!res.ok) throw new Error("Invalid credentials");
        const data = await res.json();
        localStorage.setItem('bt_token', data.access_token);
        localStorage.setItem('bt_role', data.role);
        location.reload();
      } catch (err) {
        document.getElementById('login-error').innerText = err.message;
      }
    }

    function logout() {
      localStorage.removeItem('bt_token');
      localStorage.removeItem('bt_role');
      location.reload();
    }

    function toggleAdminModal() {
      const modal = document.getElementById('admin-modal');
      if (modal.style.display === 'none') {
        modal.style.display = 'flex';
        loadUsers();
      } else {
        modal.style.display = 'none';
      }
    }

    async function loadUsers() {
      const res = await fetch('/api/users', { headers: { 'Authorization': `Bearer ${localStorage.getItem('bt_token')}` } });
      const users = await res.json();
      const ul = document.getElementById('user-list');
      ul.innerHTML = '';
      
      const lang = localStorage.getItem('bt_lang') || 'en';
      const dict = translations[lang] || translations['en'];

      users.forEach(u => {
        const li = document.createElement('li');
        li.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; background: rgba(0,0,0,0.04); border-radius: 4px; border: 1px solid rgba(0,0,0,0.05);';
        
        let controls = '';
        if(u.username !== 'admin') {
          controls = `
            <div style="display:flex; gap:0.5rem; align-items:center;">
              <input type="password" id="pw-${u.id}" placeholder="***" style="padding:0.25rem 0.5rem; font-size:0.8rem; width:80px; box-shadow:none;">
              <button onclick="updatePassword(${u.id})" style="background:var(--accent-color); border:none; color:white; border-radius:4px; cursor:pointer; padding: 0.25rem 0.5rem; font-size:0.8rem;">${dict.btn_upd || 'Update'}</button>
              <button onclick="deleteUser(${u.id})" style="background:var(--danger-color); border:none; color:white; border-radius:4px; cursor:pointer; padding: 0.25rem 0.5rem; font-size:0.8rem;">${dict.btn_del || 'Del'}</button>
            </div>
          `;
        }
        li.innerHTML = `<span style="font-weight:600; font-size: 0.9rem;">${u.username}</span> ${controls}`;
        ul.appendChild(li);
      });
    }

    async function createUser() {
      const u = document.getElementById('new-user').value;
      const p = document.getElementById('new-pass').value;
      await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('bt_token')}` },
        body: JSON.stringify({username: u, password: p, role: 'user'})
      });
      document.getElementById('new-user').value = '';
      document.getElementById('new-pass').value = '';
      loadUsers();
    }

    async function deleteUser(id) {
      if(!confirm("Are you sure?")) return;
      await fetch(`/api/users/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${localStorage.getItem('bt_token')}` }
      });
      loadUsers();
    }

    async function updatePassword(id) {
      const newPw = document.getElementById(`pw-${id}`).value;
      if(!newPw) {
        alert("Please enter a new password");
        return;
      }
      await fetch(`/api/users/${id}/password`, {
        method: 'PUT',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${localStorage.getItem('bt_token')}` 
        },
        body: JSON.stringify({ new_password: newPw })
      });
      alert("Password updated");
      loadUsers();
    }

    async function createSession() {
      const eName = document.getElementById('event-name').value.trim() || 'Live Event';
      try {
        const response = await fetch('/api/sessions', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('bt_token')}`
          },
          body: JSON.stringify({ source_language: 'auto', event_name: eName })
        });
        if (response.status === 401) {
          logout();
          return;
        }
        const data = await response.json();
        currentEventCode = data.event_code;
        
        document.getElementById('setup-section').style.display = 'none';
        
        // Generate QR Code
        const joinUrl = `${window.location.origin}/participant?code=${data.event_code}`;
        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById('qrcode'), {
          text: joinUrl,
          width: 180,
          height: 180,
          colorDark : "#1f2937",
          colorLight : "transparent",
          correctLevel : QRCode.CorrectLevel.H
        });
        
        document.getElementById('broadcast-section').style.display = 'block';
        document.getElementById('display-code').innerText = currentEventCode;
      } catch (err) {
        alert("Failed to create session. Is the server running?");
      }
    }

    async function startBroadcast() {
      if (!currentEventCode) return;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        
        // --- Voice Activity Detection ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 512;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        
        // We will track if there was ANY voice spike in the current 3-s chunk
        let voiceDetectedInChunk = false;
        window.vadInterval = setInterval(() => {
          analyser.getByteFrequencyData(dataArray);
          const sum = dataArray.reduce((a, b) => a + b, 0);
          const average = sum / dataArray.length;
          if (average > 20) { // Sensitivity threshold
            voiceDetectedInChunk = true;
          }
        }, 100);
        // --------------------------------

        // Setup WebSocket
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        
        
        // Audio MIME type optimized for Whisper
        let mimeType = 'audio/webm;codecs=opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) {
          mimeType = 'audio/mp4'; 
        }
        
        mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
        
        socket = new WebSocket(`${protocol}//${window.location.host}/ws/host/${currentEventCode}`);
        
        socket.onopen = () => {
          const dict = translations[localStorage.getItem('bt_lang') || 'en'];
          document.getElementById('status-indicator').innerText = dict.status_broadcasting;
          document.getElementById('btn-start').style.display = 'none';
          document.getElementById('btn-stop').style.display = 'inline-flex';
          document.getElementById('display-code').parentElement.classList.add('recording');
          
          // To get standalone decodable files for Whisper, we must start/stop periodically
          mediaRecorder.start();
          window.recordInterval = setInterval(() => {
            if(mediaRecorder.state === 'recording') {
              mediaRecorder.stop();
              mediaRecorder.start();
            }
          }, 3000);
          
          mediaRecorder.ondataavailable = async (event) => {
            if (event.data.size > 0 && socket.readyState === WebSocket.OPEN) {
              if (voiceDetectedInChunk) {
                const buffer = await event.data.arrayBuffer();
                socket.send(buffer);
                voiceDetectedInChunk = false; // reset for next chunk
              } else {
                 console.log("Sessizlik atlandı.");
              }
            }
          };
        };

        socket.onerror = (e) => {
          const dict = translations[localStorage.getItem('bt_lang') || 'en'];
          document.getElementById('status-indicator').innerText = dict.status_error;
          stopBroadcast();
        };

        socket.onclose = () => {
          stopBroadcast();
        };

      } catch (err) {
        alert("Microphone access denied or not available.");
        console.error(err);
      }
    }

    function stopBroadcast() {
      if (window.recordInterval) {
        clearInterval(window.recordInterval);
      }
      if (window.vadInterval) {
        clearInterval(window.vadInterval);
      }
      if (mediaRecorder) {
        if(mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
      }
      if (socket) {
        socket.close();
      }
      const dict = translations[localStorage.getItem('bt_lang') || 'en'];
      document.getElementById('status-indicator').innerText = dict.status_stopped;
      document.getElementById('btn-start').style.display = 'inline-flex';
      document.getElementById('btn-stop').style.display = 'none';
      document.getElementById('display-code').parentElement.classList.remove('recording');
    }
  </script>
</body>
</html>
