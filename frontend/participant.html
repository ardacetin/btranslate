<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Feed - btranslate</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    /* Full-screen focus mode for participants */
    body {
      margin: 0;
      padding: 0;
      justify-content: flex-start;
      padding-top: 2rem;
    }
    .feed-container {
      height: 60vh;
      margin-top: 1rem;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--border-color);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.03);
    }
  </style>
</head>
<body style="margin-top: 0;">

  <!-- Navbar Navigation -->
  <nav class="navbar">
    <a href="/" class="nav-brand" data-i18n="nav_title">B-Translate</a>
    <div class="lang-switcher">
      <span class="lang-toggle" data-lang="en" onclick="changeSiteLanguage('en')">EN</span>
      <span>|</span>
      <span class="lang-toggle" data-lang="tr" onclick="changeSiteLanguage('tr')">TR</span>
    </div>
  </nav>

  <div class="container" style="max-width: 900px; margin-top: 6rem;">
    
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1rem;">
      <div>
        <h2 class="title-primary" style="font-size: 1.8rem; margin: 0; text-align: left;" data-i18n="part_feed_title">Live Feed</h2>
        <p id="display-event-name" style="color: var(--text-secondary); margin-top: 0.25rem; font-size: 1.1rem; font-weight: 500;"></p>
      </div>
      
      <div style="display: flex; gap: 1rem; align-items: center;">
        <span id="connection-status" style="color: var(--text-secondary); font-size: 0.9em; display: flex; align-items: center; gap: 8px;">
          <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--text-secondary); display: inline-block;"></span>
          <span id="status-text" data-i18n="status_disconnected">Disconnected</span>
        </span>
        <select id="lang-select" onchange="changeLanguage()" style="background: rgba(255,255,255,0.9); border: 1px solid var(--border-color);">
          <option value="en">English</option>
          <option value="tr">Turkish</option>
          <option value="de">German</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
        </select>
      </div>
    </div>
    
    <div style="background: rgba(255, 230, 230, 0.4); border-left: 4px solid var(--danger-color); padding: 0.75rem 1rem; margin-bottom: 1rem; border-radius: 4px; font-size: 0.85rem; color: var(--text-secondary);" data-i18n="disclaimer">
      ⚠️ This is an AI-powered translation system. Transcriptions and translations are generated automatically and may contain errors.
    </div>

    <div class="feed-container" id="feed">
      <div id="wait-msg" style="text-align: center; color: var(--text-secondary); margin-top: auto; margin-bottom: auto; opacity: 0.5;" data-i18n="waiting_msg">
        Waiting for transmission...
      </div>
    </div>

  </div>

  <footer class="site-footer" data-i18n="footer_copy">
    © 2026 B-Translate. Made with ❤️ by Beykoz Üniversitesi Bilgi İşlem Direktörlüğü.
  </footer>

  <script src="/static/lang.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const eventCode = urlParams.get('code');
    const feed = document.getElementById('feed');
    let socket;
    let currentLang = 'en';

    async function initParticipant() {
      if (!eventCode) {
        alert('Etkinlik kodu eksik. Lütfen geçerli bir bağlantı kullanın.');
        window.location.href = '/';
        return;
      }
      
      try {
        const res = await fetch(`/api/sessions/${eventCode}`);
        if(res.ok) {
          const data = await res.json();
          document.getElementById('display-event-name').innerText = data.event_name;
        } else {
          document.getElementById('display-event-name').innerText = eventCode;
        }
      } catch(e) {
        console.error(e);
      }

      const savedLang = localStorage.getItem('bt_target_lang');
      if (savedLang) {
        currentLang = savedLang;
        document.getElementById('lang-select').value = savedLang;
      }

      connectWebSocket(currentLang);
    }

    function connectWebSocket(lang) {
      if (socket) {
        socket.close();
      }

      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      socket = new WebSocket(`${protocol}//${window.location.host}/ws/participant/${eventCode}/${lang}`);
      
      const statusDot = document.querySelector('#connection-status span:first-child');
      const statusText = document.getElementById('status-text');

      socket.onopen = () => {
        statusDot.style.background = 'var(--success-color)';
        statusDot.style.boxShadow = '0 0 8px var(--success-color)';
        const dict = translations[localStorage.getItem('bt_lang') || 'en'];
        statusText.innerText = `${dict.status_connected} ${eventCode}`;
        
        // Clear "Waiting..." message if present
        const waitMsg = document.getElementById('wait-msg');
        if (waitMsg) waitMsg.remove();
      };

      socket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        appendFeedItem(data.original, data.translated);
      };

      socket.onclose = () => {
        statusDot.style.background = 'var(--danger-color)';
        statusDot.style.boxShadow = 'none';
        const dict = translations[localStorage.getItem('bt_lang') || 'en'];
        statusText.innerText = dict.status_disconnected;
      };
      
      socket.onerror = (err) => {
        console.error("Kano WebSocket Hatası:", err);
      };
    }

    function appendFeedItem(originalText, translatedText) {
      const item = document.createElement('div');
      item.className = 'feed-item';
      
      const orig = document.createElement('div');
      orig.className = 'original';
      orig.innerText = originalText;
      
      const trans = document.createElement('div');
      trans.className = 'translated';
      trans.innerText = translatedText;
      trans.style.fontSize = '1.2rem';
      trans.style.fontWeight = '500';
      trans.style.marginTop = '0.5rem';
      trans.style.lineHeight = '1.5';
      
      item.appendChild(orig);
      item.appendChild(trans);
      feed.appendChild(item);
      
      // Auto-scroll to bottom smoothly
      feed.scrollTo({
        top: feed.scrollHeight,
        behavior: 'smooth'
      });
    }

    function changeLanguage() {
      currentLang = document.getElementById('lang-select').value;
      localStorage.setItem('bt_target_lang', currentLang);
      connectWebSocket(currentLang);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      initParticipant();
    });
  </script>
</body>
</html>
